services:
  - type: web
    name: ieoh-agent
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_GPT4
        value: gpt-4o-mini
      - key: OPENAI_MODEL_GPT35
        value: gpt-3.5-turbo
      - key: TEMPERATURE_REASONING
        value: "0.7"
      - key: TEMPERATURE_STRUCTURED
        value: "0.3"
      - key: MAX_TOKENS
        value: "4000"
